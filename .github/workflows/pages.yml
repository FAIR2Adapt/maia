name: Build and deploy Climate Connectivity Taxonomy to GitHub Pages

# Builds a static SkoHub Vocabs site from the raw concepts.ttl export and
# publishes it to GitHub Pages. The raw export stays untouched in the repo;
# scripts/prepare_vocab.py normalises it (licence, hierarchy, de-duplication)
# at build time, so dropping in a fresh export and committing is enough to
# refresh the published site.

on:
  # rebuild when the pipeline itself changes
  push:
    branches: [main]
    paths:
      - config.yaml
      - scripts/**
      - .github/workflows/pages.yml
  # let the maintainer trigger a refresh from the live hub by hand
  workflow_dispatch:
  # and refresh automatically once a week (Monday 04:00 UTC)
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write   # to commit the fetched concepts.ttl snapshot back to the repo
  pages: write
  id-token: write

# Allow one concurrent deployment, but let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rdflib
        run: pip install rdflib

      - name: Fetch the complete vocabulary from the connectivity-hub
        # Pulls the full tree (top concepts AND their children) by crawling the
        # hierarchy links, so the published site always matches the live hub.
        run: python scripts/fetch_vocab.py concepts.fetched.ttl

      - name: Save the fetched vocabulary as concepts.ttl (record of what was deployed)
        # Commit the exact data this run published, so the repo always holds a
        # static, versioned snapshot of the live taxonomy. concepts.ttl is not in
        # this workflow's trigger paths, so this commit does not start a new run.
        run: |
          cp concepts.fetched.ttl concepts.ttl
          if git diff --quiet -- concepts.ttl; then
            echo "concepts.ttl unchanged — nothing to commit"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add concepts.ttl
            git commit -m "Update concepts.ttl snapshot from connectivity-hub [skip ci]"
            git push
          fi

      - name: Normalise the vocabulary (licence + hierarchy + de-dup)
        run: |
          mkdir -p data
          python scripts/prepare_vocab.py concepts.fetched.ttl data/concepts.ttl

      - name: Build the SkoHub site
        run: |
          # Project Pages are served from /<repo>, so the site must be built
          # with that path prefix (SkoHub reads it from BASEURL).
          echo "BASEURL=/${GITHUB_REPOSITORY#*/}" > .env
          mkdir -p public && chmod 777 public
          docker run --rm \
            -v "$PWD/public:/app/public" \
            -v "$PWD/data:/app/data" \
            -v "$PWD/.env:/app/.env" \
            -v "$PWD/config.yaml:/app/config.yaml" \
            skohub/skohub-vocabs-docker:latest

      - name: Reclaim ownership of the built site
        # The SkoHub container runs as root, so it writes public/ as root. The
        # post-build steps below run as the non-root runner and can't overwrite
        # those files (PermissionError) — hand ownership back to the runner first.
        run: sudo chown -R "$(id -u):$(id -g)" public

      - name: Sort the navigation tree alphabetically
        # SkoHub renders the nav tree in the JSON's array order, with no sorting of
        # its own, so the ~1000 top concepts and their children come out unordered
        # and structured branches are hard to find by browsing. Sort every
        # hasTopConcept/narrower array in the built output by prefLabel.
        run: python scripts/sort_tree.py public

      - name: Fix the navigation tree indentation
        # SkoHub indents parent rows ~25px past their leaf siblings (the expand
        # toggle is an in-row flex child), so an expanded parent looks nested under
        # the leaf above it. Inject CSS that aligns leaf rows with their siblings.
        run: python scripts/fix_tree_indent.py public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
